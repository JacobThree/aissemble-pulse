name: city-pulse

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: city_pulse
      POSTGRES_PASSWORD: city_pulse
      POSTGRES_DB: city_pulse
    ports:
      # Avoid clash with a host Postgres on 5432
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./deploy/sql/init-timescale.sql:/docker-entrypoint-initdb.d/001-city-pulse.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U city_pulse -d city_pulse"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

volumes:
  timescale_data:
